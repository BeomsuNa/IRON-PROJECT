name: Ultimate Vercel Debug
on: [workflow_dispatch]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Basic Info
        run: |
          echo "=== BASIC DEBUG ==="
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "GITHUB_SHA: $GITHUB_SHA"
          echo "RUNNER_OS: $RUNNER_OS"
      
      - name: 2. Secrets Length Check
        run: |
          echo "=== SECRETS LENGTH ==="
          echo "VERCEL_TOKEN length: ${#VERCEL_TOKEN}"
          echo "VERCEL_ORG_ID length: ${#VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      
      - name: 3. Token Preview (Safe)
        if: env.VERCEL_TOKEN != ''
        run: echo "VERCEL_TOKEN starts with: ${VERCEL_TOKEN:0:10}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      
      - name: 4. Vercel CLI Test
        if: env.VERCEL_TOKEN != ''
        run: |
          echo "Testing vercel CLI..."
          npx vercel whoami
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      
      - name: 5. npm install vercel first
        run: npm i -g vercel@latest
      
      - name: 6. Final Vercel Test
        if: env.VERCEL_TOKEN != ''
        run: vercel whoami
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
