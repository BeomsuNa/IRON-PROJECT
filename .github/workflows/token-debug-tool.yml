# .github/workflows/debug-deploy.yml (새 파일 생성)
name: Debug Vercel Deploy
on: [push, workflow_dispatch]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Secrets Debug
        run: |
          echo "=== SECRETS DEBUG ==="
          echo "VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "GITHUB_REF: $GITHUB_REF"
        
      
      - name: Vercel Whoami
        run: npx vercel whoami
      
      - name: Vercel Projects List
        run: npx vercel projects ls
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
